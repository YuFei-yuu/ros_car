map_name: map_01
use_teb: true
map_frame: map

mapping:
  map_name: map_01
  map_topic: /map
  scan_topic: /scan
  save_path: /home/ubuntu/ros2_ws/src/slam/maps/map_01
  status_period_sec: 5.0
  save_timeout_sec: 15.0

navigation:
  timeout_sec: 600.0
  feedback_period_sec: 5.0
  stop_topics:
    - /controller/cmd_vel
    - /cmd_vel

qrcode:
  image_topic: /depth_cam/rgb0/image_raw
  target_topic: /qrcode/target
  image_result_topic: /qrcode/image_result
  detection_period_sec: 0.2
  timeout_sec: 0.0
  allowed_targets:
    - pick_area
    - goal_red
    - goal_green
    - goal_blue

waypoints:
  home:
    x: 0.0
    y: 0.0
    yaw_deg: 0.0
  pick_area:
    x: 1.0
    y: 0.0
    yaw_deg: 0.0
  goal_red:
    x: 1.0
    y: 1.0
    yaw_deg: 90.0
  goal_green:
    x: 0.0
    y: 1.0
    yaw_deg: 180.0
  goal_blue:
    x: -1.0
    y: 1.0
    yaw_deg: 180.0

behavior:
  require_initial_pose: true
  initial_pose_topic: /initialpose
  start_topic: /behavior_start
  reset_topic: /behavior_reset
  default_task: qrcode_target   #patrol, qrcode_target
  patrol_points:
    - pick_area
    - home
  patrol_count: 3
